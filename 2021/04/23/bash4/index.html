        <h1 id="bash递归函数测试"><a href="#bash递归函数测试" class="headerlink" title="bash递归函数测试"></a>bash递归函数测试</h1><figure class="highlight bash"><figcaption><span>recursion_test.sh</span></figcaption><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#!/bin/bash</span></span><br><span class="line"><span class="comment"># using recursion</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">function</span> factorial &#123;</span><br><span class="line">    <span class="keyword">if</span> [ <span class="variable">$1</span> -lt 1 ]</span><br><span class="line">    <span class="keyword">then</span></span><br><span class="line">        <span class="built_in">echo</span> 0</span><br><span class="line">    <span class="keyword">elif</span> [ <span class="variable">$1</span> -eq 1 ]</span><br><span class="line">    <span class="keyword">then</span></span><br><span class="line">        <span class="built_in">echo</span> 1</span><br><span class="line">    <span class="keyword">else</span></span><br><span class="line">        <span class="built_in">local</span> temp1=<span class="variable">$1</span></span><br><span class="line">        <span class="built_in">local</span> temp2=$(factorial $[ <span class="variable">$1</span> - 1 ])</span><br><span class="line">        <span class="built_in">local</span> result=$[ <span class="variable">$temp1</span> * <span class="variable">$temp2</span> ]</span><br><span class="line">        <span class="built_in">echo</span> <span class="variable">$result</span></span><br><span class="line">    <span class="keyword">fi</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">function</span> sumn &#123;</span><br><span class="line">    <span class="keyword">if</span> [ <span class="variable">$1</span> -lt 1 ]</span><br><span class="line">    <span class="keyword">then</span></span><br><span class="line">        <span class="built_in">echo</span> 0</span><br><span class="line">    <span class="keyword">elif</span> [ <span class="variable">$1</span> -eq 1 ]</span><br><span class="line">    <span class="keyword">then</span></span><br><span class="line">        <span class="built_in">echo</span> 1</span><br><span class="line">    <span class="keyword">else</span></span><br><span class="line">        <span class="built_in">local</span> temp1=<span class="variable">$1</span></span><br><span class="line">        <span class="built_in">local</span> temp2=$(sumn $[ <span class="variable">$1</span> - 1 ])</span><br><span class="line">        <span class="built_in">local</span> result=$[ <span class="variable">$temp1</span> + <span class="variable">$temp2</span> ]</span><br><span class="line">        <span class="built_in">echo</span> <span class="variable">$result</span></span><br><span class="line">    <span class="keyword">fi</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">function</span> fbnq &#123;</span><br><span class="line">    <span class="keyword">if</span> [ <span class="variable">$1</span> -lt 1 ]</span><br><span class="line">    <span class="keyword">then</span></span><br><span class="line">        <span class="built_in">echo</span> 0</span><br><span class="line">    <span class="keyword">elif</span> [ <span class="variable">$1</span> -lt 2 ]</span><br><span class="line">    <span class="keyword">then</span></span><br><span class="line">        <span class="built_in">echo</span> 1</span><br><span class="line">    <span class="keyword">else</span></span><br><span class="line">        <span class="built_in">local</span> temp1=$(fbnq $[ <span class="variable">$1</span> - 1 ])</span><br><span class="line">        <span class="built_in">local</span> temp2=$(fbnq $[ <span class="variable">$1</span> - 2 ])</span><br><span class="line">        <span class="built_in">local</span> result=$[ <span class="variable">$temp1</span> + <span class="variable">$temp2</span> ]</span><br><span class="line">        <span class="built_in">echo</span> <span class="variable">$result</span></span><br><span class="line">    <span class="keyword">fi</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="built_in">read</span> -p <span class="string">&quot;Enter value: &quot;</span> value</span><br><span class="line">result=$(factorial <span class="variable">$value</span>)</span><br><span class="line">totalsum=$(sumn <span class="variable">$value</span>)</span><br><span class="line">fibon=$(fbnq <span class="variable">$value</span>)</span><br><span class="line"><span class="built_in">echo</span> <span class="string">&quot;The factorial of <span class="variable">$value</span> is: <span class="variable">$result</span>&quot;</span></span><br><span class="line"><span class="built_in">echo</span> <span class="string">&quot;The total sum of <span class="variable">$value</span> is: <span class="variable">$totalsum</span>&quot;</span></span><br><span class="line"><span class="built_in">echo</span> <span class="string">&quot;FibonacciRecursive of <span class="variable">$value</span> is: <span class="variable">$fibon</span>&quot;</span></span><br></pre></td></tr></table></figure>
